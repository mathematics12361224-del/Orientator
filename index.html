<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'>
<title>Glass Table Puzzle Elite</title><link rel='manifest' href='manifest.json'>
<style>
body{margin:0;font-family:Arial;background:#08111f;color:#fff;display:grid;place-items:center;min-height:100vh}
.wrap{width:min(900px,96vw);padding:20px}.card{background:#132238;border:1px solid #345;border-radius:24px;padding:18px;box-shadow:0 20px 60px rgba(0,0,0,.35)}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:18px;max-width:520px;margin:20px auto;aspect-ratio:1}
.cup{border-radius:24px;border:1px solid #567;background:#1b2a44;font-size:64px;display:grid;place-items:center;cursor:pointer;min-height:180px}
.row{display:flex;gap:10px;flex-wrap:wrap}.btn{padding:12px 16px;border-radius:14px;border:0;background:#3a6df0;color:#fff;font-weight:700}
.small{opacity:.8}
#shutter{position:fixed;inset:0;background:#000;opacity:0;pointer-events:none;transition:opacity .25s}
.show{opacity:1}
</style></head><body><div id='shutter'></div><div class='wrap'><div class='card'>
<h1>Glass Table Puzzle Elite</h1><p class='small'>Touch up to two hidden glasses, inspect/flip, then end turn. Secret rotation occurs behind shutter.</p>
<div class='row'><button class='btn' onclick='newGame()'>New Game</button><button class='btn' onclick='endTurn()'>End Turn</button></div>
<p id='stats'></p><div class='grid' id='grid'></div><p id='msg'></p></div></div>
<script>
let cups=[],seen=[0,0,0,0],used=0,turn=1,busy=false,won=false;
function r(n){return Math.floor(Math.random()*n)}
function initState(){do{cups=[r(2),r(2),r(2),r(2)]}while(cups.every(v=>v===cups[0]))}
function icon(v){return v?'<div style="transform:rotate(180deg)">🥛</div>':'🥛'}
function draw(){
 let g=document.getElementById('grid'); g.innerHTML='';
 for(let i=0;i<4;i++){let d=document.createElement('button'); d.className='cup';
 d.innerHTML=(seen[i]||won)?icon(cups[i]):'?'; d.onclick=()=>tap(i); d.disabled=busy||won||(used>=2&&!seen[i]); g.appendChild(d);}
 document.getElementById('stats').innerText='Turn '+turn+' | Touches left '+(2-used);
}
function tap(i){
 if(busy||won)return;
 if(!seen[i]){if(used>=2)return; seen[i]=1; used++; draw(); return;}
 cups[i]=1-cups[i]; check(); draw();
}
function rotate(){
 let s=r(4); for(let k=0;k<s;k++) cups=[cups[3],cups[0],cups[1],cups[2]];
}
async function endTurn(){
 if(busy||won)return; busy=true; document.getElementById('shutter').className='show';
 await new Promise(x=>setTimeout(x,250)); rotate(); seen=[0,0,0,0]; used=0; turn++;
 await new Promise(x=>setTimeout(x,350)); document.getElementById('shutter').className=''; busy=false; draw(); check();
}
function check(){if(cups.every(v=>v===cups[0])){won=true;document.getElementById('msg').innerText='You Won!';draw();}}
function newGame(){won=false;turn=1;used=0;seen=[0,0,0,0];document.getElementById('msg').innerText='';initState();draw();}
if('serviceWorker' in navigator){navigator.serviceWorker.register('service-worker.js').catch(()=>{})}
newGame();
</script></body></html>
